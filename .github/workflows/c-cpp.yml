name: C/C++ Snapshot Build (Fast)

on:
  push:
    branches: ["main"]
    paths:
      - '**.c'
      - '**.cpp'
      - '**.h'
      - 'Makefile'
  pull_request:
    branches: ["main"]
    paths:
      - '**.c'
      - '**.cpp'
      - '**.h'
      - 'Makefile'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # ---------------- VERSION ----------------
    - name: Set version
      id: version
      run: |
        if [ ! -f VERSION ]; then
          echo "0.0" > VERSION
        fi

        ver=$(cat VERSION)
        major=$(echo $ver | cut -d. -f1)
        minor=$(echo $ver | cut -d. -f2)

        minor=$((minor + 1))

        if [ $minor -gt 10 ]; then
          major=$((major + 1))
          minor=1
        fi

        newver="$major.$minor"
        echo $newver > VERSION

        echo "version=$newver" >> $GITHUB_OUTPUT

    # ---------------- CCACHE ----------------
    - name: Install deps + ccache
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache

    - name: Setup ccache
      run: |
        echo "max_size = 500M" > ~/.ccache/ccache.conf
        echo "/usr/lib/ccache" >> $GITHUB_PATH

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ccache-${{ runner.os }}-${{ hashFiles('**/*.c', '**/*.cpp', '**/*.h') }}
        restore-keys: |
          ccache-${{ runner.os }}-

    # ---------------- BUILD ----------------
    - name: Build
      run: |
        export CC="ccache gcc"
        export CXX="ccache g++"

        make -j$(nproc)

    # ---------------- STATS ----------------
    - name: ccache stats
      run: ccache -s

    # ---------------- PACKAGE ----------------
    - name: Package
      run: |
        mkdir -p out
        find . -type f \( -name "*.exe" -o -name "*.out" -o -name "*.bin" \) -exec cp {} out/ \; || true

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: snapshot-${{ steps.version.outputs.version }}
        path: out/
