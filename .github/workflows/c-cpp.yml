name: C/C++ Fast Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # ---------------- LINUX ----------------
    - name: Install deps (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          autoconf automake libtool pkg-config

    - name: Build (Linux)
      if: runner.os == 'Linux'
      run: |
        # Generate configure if missing
        [ -f configure ] || autoreconf -i

        ./configure CFLAGS="-O2 -pipe"
        make -j$(nproc)

    # ---------------- WINDOWS ----------------
    - name: Setup MSYS2 (GCC + make)
      if: runner.os == 'Windows'
      uses: msys2/setup-msys2@v2
      with:
        update: false
        msystem: MINGW64
        install: >
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-make
          mingw-w64-x86_64-autoconf
          mingw-w64-x86_64-automake
          mingw-w64-x86_64-libtool
          mingw-w64-x86_64-pkg-config

    - name: Build (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        # Ensure correct environment
        export CC=gcc
        export CXX=g++

        [ -f configure ] || autoreconf -i

        ./configure CFLAGS="-O2"
        make -j$(nproc)

    # ---------------- PACKAGE ----------------
    - name: Package output
      run: |
        mkdir -p out
        find . -type f \( -name "*.exe" -o -name "*.out" -o -name "*.bin" \) -exec cp {} out/ \; || true

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-${{ runner.os }}
        path: out/
