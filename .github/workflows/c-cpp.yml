name: C/C++ Snapshot Build (Fast)

on:
  push:
    branches: ["main"]
    paths:
      - '**.c'
      - '**.cpp'
      - '**.h'
      - 'Makefile'
  pull_request:
    branches: ["main"]
    paths:
      - '**.c'
      - '**.cpp'
      - '**.h'
      - 'Makefile'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    # ---------------- VERSION ----------------
    - name: Set version
      id: version
      shell: bash
      run: |
        if [ ! -f VERSION ]; then
          echo "0.0" > VERSION
        fi

        ver=$(cat VERSION)
        major=$(echo $ver | cut -d. -f1)
        minor=$(echo $ver | cut -d. -f2)

        minor=$((minor + 1))

        if [ $minor -gt 10 ]; then
          major=$((major + 1))
          minor=1
        fi

        newver="$major.$minor"
        echo $newver > VERSION

        echo "version=$newver" >> $GITHUB_OUTPUT

    # ---------------- LINUX ----------------
    - name: Install deps (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache

    - name: Setup ccache (Linux)
      if: runner.os == 'Linux'
      run: |
        mkdir -p ~/.ccache
        ccache --set-config=max_size=500M
        echo "/usr/lib/ccache" >> $GITHUB_PATH

    - name: Cache ccache (Linux)
      if: runner.os == 'Linux'
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ccache-linux-${{ hashFiles('**/*.c', '**/*.cpp', '**/*.h') }}
        restore-keys: |
          ccache-linux-

    - name: Build (Linux)
      if: runner.os == 'Linux'
      run: |
        export CC="ccache gcc"
        export CXX="ccache g++"
        make -j$(nproc)

    # ---------------- WINDOWS ----------------
    - name: Setup MSYS2
      if: runner.os == 'Windows'
      uses: msys2/setup-msys2@v2
      with:
        update: false
        msystem: MINGW64
        install: >
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-make
          mingw-w64-x86_64-ccache

    - name: Setup ccache (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        mkdir -p ~/.ccache
        ccache --set-config=max_size=500M

    - name: Cache ccache (Windows)
      if: runner.os == 'Windows'
      uses: actions/cache@v4
      with:
        path: C:\msys64\home\runneradmin\.ccache
        key: ccache-windows-${{ hashFiles('**/*.c', '**/*.cpp', '**/*.h') }}
        restore-keys: |
          ccache-windows-

    - name: Build (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        export CC="ccache gcc"
        export CXX="ccache g++"
        make -j$(nproc)

    # ---------------- STATS ----------------
    - name: ccache stats
      run: ccache -s || true

    # ---------------- PACKAGE ----------------
    - name: Package
      run: |
        mkdir -p out
        find . -type f \( -name "*.exe" -o -name "*.out" -o -name "*.bin" \) -exec cp {} out/ \; || true

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: snapshot-${{ steps.version.outputs.version }}-${{ runner.os }}
        path: out/
