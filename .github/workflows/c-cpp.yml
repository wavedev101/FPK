name: C/C++ CI (Artifacts Only)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Linux build
    - name: Install deps (Linux)
      if: runner.os == 'Linux'
      run: sudo apt update && sudo apt install -y build-essential autoconf automake

    - name: Build (Linux)
      if: runner.os == 'Linux'
      run: |
        ./configure
        make -j$(nproc)

    # Windows build (MSYS2)
    - name: Setup MSYS2
      if: runner.os == 'Windows'
      uses: msys2/setup-msys2@v2
      with:
        install: mingw-w64-x86_64-gcc make autoconf automake

    - name: Build (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        ./configure
        make

    # Package only useful files (not whole repo garbage)
    - name: Package output
      run: |
        mkdir out
        find . -type f \( -name "*.exe" -o -name "*.out" -o -name "*.bin" \) -exec cp {} out/ \; || true

    # Upload artifacts
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-${{ runner.os }}
        path: out/
